<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Site</title>
    <style>
        /* Estilo para el fondo oscuro detrás de la ventana modal */
        #fondo-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s;
            z-index: 1;
        }

        /* Estilo para la ventana modal */
        #ventana-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s;
            z-index: 2;
        }

        /* Estilo para la transición de opacidad */
        #fondo-modal.mostrar,
        #ventana-modal.mostrar {
            opacity: 1;
            visibility: visible;
        }

        #fondo-modal.ocultar,
        #ventana-modal.ocultar {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s, visibility 0s 0.5s;
        }

        /* Estilo para el botón */
        #boton-sonido {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
    <link rel="stylesheet" href="css/bootstrap.css">
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
    <script src="js/bootstrap.bundle.js"></script>
    <script src="js/jquery-3.6.3.min.js"></script>
</head>

<body onload="mostrarVentana()">
    <!-- Ventana modal -->
    <div id="fondo-modal"></div>
    <div id="ventana-modal">
        <!-- Contenido de la ventana modal -->
        <div id="ventana-modal-contenido">
            <h1>Bienvenido</h1>
            <p>Haga clic en el botón para reproducir un sonido.</p>
            <button id="boton-sonido">Reproducir sonido</button>
        </div>
    </div>
    <div class="container-fluid !direction !spacing">
        <div class="row ${1| ,row-cols-2,row-cols-3, auto,justify-content-md-center,|}">
            <div class="col-4 bg-primary">
                <p>col-4</p>
            </div>
            <div class="col-4 bg-secondary ">
                <p>col-4</p>
            </div>
            <div class="col-4 bg-primary ">
                <p>col-4</p>
            </div>
        </div>
    </div>
    <div class="container text-center py-5">
        <h1 class="display-1">Estos alumnitos están aprendiendo Bootstrap 5</h1>
    </div>
</body>
<script>

    // Obtener elementos de la página
    var fondoModal = document.getElementById("fondo-modal");
    var ventanaModal = document.getElementById("ventana-modal");
    var botonSonido = document.getElementById("boton-sonido");

    // Función para reproducir el sonido
    function reproducirSonido() {
        var audio = new Audio('assets/lolAnnouncer.mp3');
        audio.play();
        setTimeout(function () {
            // Ocultar ventana modal con transición
            fondoModal.classList.add("ocultar");
            ventanaModal.classList.add("ocultar");
        }, 500);
    }

    // Mostrar ventana modal y reproducir sonido al cargar la página
    function mostrarVentana() {

        setTimeout(function () {
            // Ocultar ventana modal con transición
            fondoModal.classList.add("mostrar");
            ventanaModal.classList.add("mostrar");
        }, 100);
        botonSonido.addEventListener("click", function () {
            reproducirSonido();
        });
    }
</script>

</html>
